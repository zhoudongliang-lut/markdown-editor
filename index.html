<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器 - 公众号排版版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --accent: #e94560;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --border: #2a2a4a;
            --success: #00d9a5;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Themes */
        body.theme-classic-white { --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --bg-tertiary: #e9ecef; --text-primary: #212529; --text-secondary: #6c757d; --border: #dee2e6; }
        body.theme-github { --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-tertiary: #21262d; --accent: #58a6ff; --text-primary: #c9d1d9; --text-secondary: #8b949e; --border: #30363d; }
        body.theme-notion { --bg-primary: #ffffff; --bg-secondary: #f7f7f5; --bg-tertiary: #efefef; --text-primary: #37352f; --text-secondary: #9b9a97; --border: #e0e0e0; --accent: #eb5757; }
        body.theme-dracula { --bg-primary: #282a36; --bg-secondary: #343746; --bg-tertiary: #44475a; --accent: #ff79c6; --text-primary: #f8f8f2; --text-secondary: #bfc7d5; --border: #6272a4; }
        body.theme-sakura { --bg-primary: #fff0f5; --bg-secondary: #ffe4e9; --bg-tertiary: #ffc0cb; --accent: #ff69b4; --text-primary: #4a4a4a; --text-secondary: #7a7a7a; --border: #ffb6c1; }
        body.theme-deep-sea { --bg-primary: #0a192f; --bg-secondary: #112240; --bg-tertiary: #233554; --accent: #64ffda; --text-primary: #ccd6f6; --text-secondary: #8892b0; --border: #233554; }
        
        header {
            background: var(--bg-secondary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        h1::before { content: "📝"; }
        
        .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
        .toolbar-group { display: flex; gap: 5px; padding: 0 8px; border-right: 1px solid var(--border); }
        .toolbar-group:last-child { border-right: none; }
        
        button {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        button:hover { background: var(--accent); border-color: var(--accent); color: white; }
        button.primary { background: var(--accent); border-color: var(--accent); color: white; }
        
        select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        .main { flex: 1; display: flex; overflow: hidden; }
        .editor, .preview { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .editor { border-right: 1px solid var(--border); }
        
        .panel-header {
            background: var(--bg-secondary);
            padding: 8px 15px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        
        #markdown-input {
            flex: 1;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: none;
            padding: 20px;
            font-size: 0.9rem;
            line-height: 1.8;
            resize: none;
            outline: none;
        }
        
        #preview-output {
            flex: 1;
            background: var(--bg-primary);
            padding: 25px;
            overflow-y: auto;
            line-height: 1.8;
        }
        
        #preview-output h1 { font-size: 1.8rem; margin: 0 0 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        #preview-output h2 { font-size: 1.4rem; margin: 30px 0 15px; }
        #preview-output h3 { font-size: 1.15rem; margin: 25px 0 10px; }
        #preview-output p { margin: 16px 0; }
        #preview-output code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
        #preview-output pre { background: var(--bg-secondary); padding: 15px; border-radius: 8px; overflow-x: auto; margin: 15px 0; }
        #preview-output ul, #preview-output ol { margin: 15px 0; padding-left: 25px; }
        #preview-output li { margin: 8px 0; }
        #preview-output blockquote { border-left: 4px solid var(--accent); padding-left: 15px; margin: 15px 0; color: var(--text-secondary); }
        #preview-output a { color: var(--accent); text-decoration: none; }
        #preview-output img { max-width: 100%; border-radius: 8px; margin: 15px 0; }
        #preview-output table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        #preview-output th, #preview-output td { border: 1px solid var(--border); padding: 10px; }
        #preview-output th { background: var(--bg-secondary); }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .status.show { opacity: 1; }
        .status.success { border-color: var(--success); color: var(--success); }
        
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .editor { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Markdown 编辑器</h1>
        <div class="toolbar">
            <div class="toolbar-group">
                <select id="theme-select" onchange="changeTheme()">
                    <option value="">默认深色</option>
                    <option value="theme-classic-white">经典纯白</option>
                    <option value="theme-github">GitHub 暗夜</option>
                    <option value="theme-notion">Notion 简约</option>
                    <option value="theme-dracula">Dracula 暗紫</option>
                    <option value="theme-sakura">樱花物語</option>
                    <option value="theme-deep-sea">深海蓝调</option>
                </select>
            </div>
            <div class="toolbar-group">
                <button onclick="pasteFromClipboard()">📋 粘贴</button>
                <button onclick="insertTemplate()">📄 模板</button>
            </div>
        </div>
        <div class="actions">
            <button onclick="downloadMd()">📥 MD</button>
            <button onclick="copyHtml()">📋 HTML</button>
            <button onclick="copyForWechat()" title="一键复制公众号">🔗 公众号</button>
            <button onclick="exportHtml()">💾 导出</button>
        </div>
    </header>
    <div class="main">
        <div class="editor">
            <div class="panel-header"><span>📝 编辑区</span><span id="char-count">0 字</span></div>
            <textarea id="markdown-input" placeholder="# 在这里输入 Markdown..."></textarea>
        </div>
        <div class="preview">
            <div class="panel-header">
                <span>👁️ 预览</span>
                <div>
                    <button onclick="setView('pc')" style="padding:2px 6px;font-size:0.7rem">🖥️</button>
                    <button onclick="setView('mobile')" style="padding:2px 6px;font-size:0.7rem">📱</button>
                </div>
            </div>
            <div id="preview-output"></div>
        </div>
    </div>
    <div class="status" id="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script>
        const input = document.getElementById('markdown-input');
        const output = document.getElementById('preview-output');
        const charCount = document.getElementById('char-count');
        const md = window.markdownit({ html: true, linkify: true, typographer: true, breaks: true });
        
        function updatePreview() {
            output.innerHTML = md.render(input.value);
            charCount.textContent = input.value.length + ' 字';
        }
        
        function showStatus(msg, success = true) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status show' + (success ? ' success' : '');
            setTimeout(() => s.classList.remove('show'), 2500);
        }
        
        function changeTheme() {
            document.body.className = document.getElementById('theme-select').value;
            localStorage.setItem('md-editor-theme', document.getElementById('theme-select').value);
            setTimeout(updatePreview, 50);
        }
        
        function setView(v) {
            if (v === 'mobile') {
                output.style.maxWidth = '375px';
                output.style.margin = '0 auto';
            } else {
                output.style.maxWidth = 'none';
                output.style.margin = '0';
            }
        }
        
        async function pasteFromClipboard() {
            try {
                input.value += '\n' + await navigator.clipboard.readText();
                updatePreview();
                showStatus('✅ 已粘贴');
            } catch(e) { showStatus('⚠️ 请手动粘贴', false); }
        }
        
        function insertTemplate() {
            const t = { '公众号': `# 标题\n\n## 前言\n\n## 正文\n\n## 总结\n\n---\n*作者*`, '技术文': `# 技术分享\n\n\`\`\`js\n// code\n\`\`\`\n\n> 重要`, '教程': `# 教程\n\n### 步骤一\n\n### 步骤二\n\n---` };
            const k = prompt('模板: 公众号/技术文/教程');
            if (k && t[k]) { input.value += '\n' + t[k]; updatePreview(); showStatus('✅ 已插入'); }
        }
        
        function downloadMd() {
            const b = new Blob([input.value], {type:'text/markdown'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='doc.md'; a.click();
            showStatus('✅ 已下载');
        }
        
        function copyHtml() { navigator.clipboard.writeText(output.innerHTML).then(() => showStatus('✅ HTML已复制')); }
        
        async function copyForWechat() {
            const c = output.cloneNode(true);
            c.querySelectorAll('img').forEach(async i => {
                try { const r = await fetch(i.src); const b = await r.blob(); i.src = await new Promise(r => { const f = new FileReader(); f.onload = () => r(f.result); f.readAsDataURL(b); }); } catch(e){}
            });
            setTimeout(() => { navigator.clipboard.writeText('<style>body{font-family:-apple-system}s</style>' + c.innerHTML).then(() => showStatus('✅ 公众号格式已复制')); }, 500);
        }
        
        function exportHtml() {
            const h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{max-width:800px;margin:0 auto;padding:40px 20px}</style></head><body>' + output.innerHTML + '</body></html>';
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([h])); a.download='doc.html'; a.click();
            showStatus('✅ 已导出');
        }
        
        // Init
        const saved = localStorage.getItem('md-editor-content');
        input.value = saved || `# 欢迎使用 Markdown 编辑器

## ✨ 新功能

- 🎨 多套主题切换
- 📋 粘贴转换
- 📄 模板插入
- 🔗 公众号复制
- 📱 移动端预览

## 代码示例

\`\`\`javascript
function hello() { console.log('Hello!'); }
\`\`\`

## 表格

| 功能 | 状态 |
|------|------|
| 实时预览 | ✅ |
| 多主题 | ✅ |

---

开始编辑吧！🎉`;
        
        input.addEventListener('input', () => localStorage.setItem('md-editor-content', input.value));
        const theme = localStorage.getItem('md-editor-theme');
        if (theme) { document.getElementById('theme-select').value = theme; document.body.className = theme; }
        updatePreview();
    </script>
</body>
</html>
